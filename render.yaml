databases:
  - name: health-coach-db
    databaseName: health_coach
    plan: free
    region: frankfurt

services:
  - type: web
    name: health-coach-web
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: ./build.sh
    startCommand: gunicorn health_coach.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: health-coach-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_ADMIN_EMAIL
        value: "denis@heracles.health"
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          name: health-coach-web
          type: web
          property: host

  - type: worker
    name: health-coach-worker
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A health_coach worker --loglevel=info --beat
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: health-coach-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false

